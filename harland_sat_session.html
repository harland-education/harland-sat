<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harland Education — SAT Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ===== BRAND TOKENS ===== */
    :root {
      --navy:       #1B2A4A;
      --gold:       #C9A84C;
      --cream:      #F7F5F0;
      --white:      #FFFFFF;
      --light-gold: #EDD98A;
      --grey:       #6B7280;
      --light-grey: #E5E3DF;
      --error:      #C0392B;
      --success:    #27AE60;
      --warning:    #D97706;
      --font-serif: 'Libre Baskerville', Georgia, serif;
      --font-sans:  'DM Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--cream);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    .site-header {
      background-color: var(--navy);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo-mark {
      width: 38px; height: 38px;
      background-color: var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-serif);
      font-weight: 700; font-size: 18px;
      color: var(--navy); flex-shrink: 0;
    }
    .brand-name { font-family: var(--font-serif); font-size: 18px; color: var(--white); }
    .brand-sub  { font-size: 11px; color: var(--gold); font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

    /* ===== TIMER ===== */
    .timer-section { display: none; align-items: center; gap: 10px; }
    .timer-display {
      font-family: var(--font-sans);
      font-size: 22px; font-weight: 600;
      color: var(--white); letter-spacing: 0.06em;
      min-width: 58px; text-align: right;
      transition: color 0.3s;
    }
    .timer-display.hidden-time { color: rgba(255,255,255,0.15); }
    .timer-display.warn  { color: #FCD34D; }
    .timer-display.danger { color: #F87171; }
    .timer-toggle {
      background: none;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px;
      color: rgba(255,255,255,0.55);
      font-family: var(--font-sans);
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.07em; text-transform: uppercase;
      padding: 4px 9px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .timer-toggle:hover { border-color: var(--gold); color: var(--gold); }

    /* ===== PROGRESS BAR ===== */
    .progress-bar-wrap { background-color: var(--navy); padding: 0 32px 14px; display: none; }
    .progress-track { height: 3px; background: rgba(255,255,255,0.12); border-radius: 2px; overflow: hidden; }
    .progress-fill  { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.4s ease; }
    .progress-label { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 7px; letter-spacing: 0.06em; text-transform: uppercase; }

    /* ===== MAIN ===== */
    .main-wrap {
      flex: 1; max-width: 760px; width: 100%;
      margin: 0 auto; padding: 40px 24px 60px;
    }

    /* ===== SCREENS ===== */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ===== NAME SCREEN ===== */
    .name-screen-title { font-family: var(--font-serif); font-size: 28px; line-height: 1.3; margin-bottom: 10px; }
    .name-screen-desc  { font-size: 15px; color: var(--grey); line-height: 1.65; margin-bottom: 34px; max-width: 540px; }
    .info-card {
      background: var(--white);
      border: 1px solid var(--light-grey);
      border-left: 4px solid var(--gold);
      border-radius: 8px;
      padding: 18px 22px; margin-bottom: 30px;
    }
    .info-card p { font-size: 14px; color: var(--grey); line-height: 1.6; }
    .info-card p + p { margin-top: 6px; }
    .info-card strong { color: var(--navy); font-weight: 600; }
    .field-label {
      display: block; font-size: 13px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--navy); margin-bottom: 8px;
    }
    .field-input {
      width: 100%; padding: 13px 16px;
      border: 1.5px solid var(--light-grey);
      border-radius: 8px;
      font-family: var(--font-sans); font-size: 16px;
      color: var(--navy); background: var(--white);
      outline: none; transition: border-color 0.2s;
    }
    .field-input:focus { border-color: var(--gold); }
    .field-error { font-size: 13px; color: var(--error); margin-top: 6px; display: none; }

    /* ===== QUESTION SCREEN ===== */
    .question-domain-badge {
      font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--gold);
      font-weight: 600; margin-bottom: 18px;
    }
    .question-card {
      background: var(--white);
      border: 1px solid var(--light-grey);
      border-radius: 10px; padding: 26px;
    }
    .question-number-line {
      font-size: 11px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--grey);
      font-weight: 600; margin-bottom: 16px;
    }
    /* Passage (for Reading & Writing questions) */
    .question-passage {
      background: var(--cream);
      border-left: 3px solid var(--light-grey);
      border-radius: 0 6px 6px 0;
      padding: 16px 20px; margin-bottom: 20px;
      font-size: 14px; line-height: 1.75;
      color: var(--navy);
    }
    .question-text {
      font-family: var(--font-serif);
      font-size: 16px; line-height: 1.6;
      color: var(--navy); margin-bottom: 22px;
    }

    /* MCQ */
    .mcq-options { list-style: none; }
    .mcq-options li { margin-bottom: 9px; }
    .mcq-options label {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 16px;
      border: 1.5px solid var(--light-grey);
      border-radius: 8px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 15px; line-height: 1.45; color: var(--navy);
    }
    .mcq-options label:hover { border-color: var(--gold); background: #FDFCF8; }
    .mcq-options input[type="radio"] { display: none; }
    .mcq-options input[type="radio"]:checked + label {
      border-color: var(--navy); background: #EEF0F4; font-weight: 500;
    }
    .option-letter { font-weight: 700; color: var(--gold); flex-shrink: 0; min-width: 18px; }

    /* SPR (Student-Produced Response) */
    .spr-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; }
    .spr-input {
      width: 180px; padding: 13px 16px;
      border: 1.5px solid var(--light-grey);
      border-radius: 8px;
      font-family: var(--font-sans); font-size: 20px;
      font-weight: 600; color: var(--navy);
      background: var(--white); outline: none;
      text-align: center; transition: border-color 0.2s;
      letter-spacing: 0.04em;
    }
    .spr-input:focus { border-color: var(--gold); }
    .spr-hint { font-size: 12px; color: var(--grey); font-style: italic; }

    /* Text response */
    .text-response {
      width: 100%; min-height: 110px;
      padding: 13px 16px;
      border: 1.5px solid var(--light-grey);
      border-radius: 8px;
      font-family: var(--font-sans); font-size: 15px;
      color: var(--navy); background: var(--white);
      resize: vertical; outline: none;
      transition: border-color 0.2s; line-height: 1.5;
    }
    .text-response:focus { border-color: var(--gold); }
    .text-char-count { font-size: 12px; color: var(--grey); text-align: right; margin-top: 6px; }

    /* Scale */
    .scale-wrap { padding: 4px 0; }
    .scale-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--grey); margin-bottom: 12px; }
    .scale-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
    .scale-btn {
      flex: 1; min-width: 36px; max-width: 60px;
      aspect-ratio: 1; border: 1.5px solid var(--light-grey);
      border-radius: 8px; background: var(--white);
      font-family: var(--font-sans); font-size: 15px; font-weight: 600;
      color: var(--navy); cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .scale-btn:hover { border-color: var(--gold); }
    .scale-btn.selected { background: var(--navy); border-color: var(--navy); color: var(--white); }

    /* Ranking */
    .rank-list { list-style: none; }
    .rank-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      background: var(--white);
      border: 1.5px solid var(--light-grey);
      border-radius: 8px; margin-bottom: 8px;
      font-size: 15px; color: var(--navy);
    }
    .rank-position { font-size: 12px; font-weight: 700; color: var(--gold); min-width: 26px; text-align: center; }
    .rank-text { flex: 1; line-height: 1.4; }
    .rank-controls { display: flex; flex-direction: column; gap: 4px; }
    .rank-btn {
      background: none; border: 1px solid var(--light-grey);
      border-radius: 4px; width: 26px; height: 22px;
      cursor: pointer; font-size: 11px; color: var(--grey);
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .rank-btn:hover { background: var(--navy); color: var(--white); border-color: var(--navy); }
    .rank-btn:disabled { opacity: 0.2; cursor: default; }
    .rank-btn:disabled:hover { background: none; color: var(--grey); border-color: var(--light-grey); }

    /* Navigation row */
    .nav-row { display: flex; align-items: center; justify-content: space-between; margin-top: 26px; gap: 12px; }
    .nav-spacer { flex: 1; }

    /* Buttons */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--navy); color: var(--white);
      font-family: var(--font-sans); font-size: 15px; font-weight: 600;
      padding: 13px 28px; border: none; border-radius: 8px;
      cursor: pointer; letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: #263D6A; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: var(--light-grey); color: var(--grey); cursor: not-allowed; transform: none; }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; color: var(--navy);
      font-family: var(--font-sans); font-size: 15px; font-weight: 500;
      padding: 12px 22px;
      border: 1.5px solid var(--light-grey);
      border-radius: 8px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-secondary:hover { border-color: var(--navy); background: rgba(27,42,74,0.04); }
    .btn-submit { background: var(--gold); color: var(--navy); font-weight: 700; }
    .btn-submit:hover { background: var(--light-gold); }

    /* Unanswered warning */
    .unanswered-warning {
      background: #FEF3C7; border: 1px solid #FCD34D;
      border-radius: 8px; padding: 13px 16px;
      font-size: 13px; color: #78350F;
      margin-top: 14px; display: none;
    }

    /* ===== RESULTS SCREEN ===== */
    .results-top {
      text-align: center; padding-bottom: 32px;
      border-bottom: 1px solid var(--light-grey);
      margin-bottom: 32px;
    }
    .results-title { font-family: var(--font-serif); font-size: 26px; color: var(--navy); margin-bottom: 6px; }
    .results-student-name { font-size: 14px; color: var(--grey); }

    /* Score ring */
    .score-ring-wrap { display: flex; justify-content: center; margin: 28px 0 22px; }
    .score-ring { position: relative; width: 160px; height: 160px; }
    .score-ring svg { transform: rotate(-90deg); display: block; }
    .score-ring-bg   { fill: none; stroke: var(--light-grey); stroke-width: 10; }
    .score-ring-fill {
      fill: none; stroke: var(--gold); stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 408.41;
      stroke-dashoffset: 408.41;
      transition: stroke-dashoffset 1s ease;
    }
    .score-ring-fill.high  { stroke: var(--success); }
    .score-ring-fill.low   { stroke: var(--error); }
    .score-ring-inner {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .score-fraction { font-family: var(--font-serif); font-size: 30px; font-weight: 700; color: var(--navy); line-height: 1; }
    .score-fraction-label { font-size: 11px; color: var(--grey); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 4px; }
    .score-pct-pill {
      display: inline-block;
      background: var(--navy); color: var(--white);
      font-size: 13px; font-weight: 600;
      padding: 4px 14px; border-radius: 20px; margin-top: 10px;
    }
    .score-pct-pill.high { background: var(--success); }
    .score-pct-pill.low  { background: var(--error); }

    /* Summary stat bar */
    .summary-bar {
      display: flex; gap: 12px;
      justify-content: center; flex-wrap: wrap;
      margin: 0 0 36px;
    }
    .summary-stat {
      background: var(--white);
      border: 1px solid var(--light-grey);
      border-radius: 10px;
      padding: 16px 20px; text-align: center;
      min-width: 90px;
    }
    .summary-val { font-family: var(--font-serif); font-size: 24px; font-weight: 700; color: var(--navy); }
    .summary-val.green { color: var(--success); }
    .summary-val.red   { color: var(--error); }
    .summary-val.amber { color: var(--warning); }
    .summary-lbl { font-size: 11px; color: var(--grey); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 4px; }

    /* Domain breakdown */
    .section-title {
      font-family: var(--font-serif); font-size: 18px;
      color: var(--navy);
      padding-bottom: 10px;
      border-bottom: 2px solid var(--navy);
      margin-bottom: 18px;
    }
    .domain-breakdown { margin-bottom: 36px; }
    .domain-row {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 0; border-bottom: 1px solid var(--light-grey);
    }
    .domain-row:last-child { border-bottom: none; }
    .domain-row-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--navy); }
    .domain-bar-wrap { width: 120px; height: 6px; background: var(--light-grey); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
    .domain-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.8s ease; }
    .domain-bar-fill.perfect { background: var(--success); }
    .domain-bar-fill.poor    { background: var(--error); }
    .domain-row-score { font-size: 13px; font-weight: 600; color: var(--navy); min-width: 38px; text-align: right; }

    /* Question review */
    .review-section { margin-bottom: 48px; }
    .review-card { background: var(--white); border: 1px solid var(--light-grey); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
    .review-card.correct  { border-left: 4px solid var(--success); }
    .review-card.incorrect { border-left: 4px solid var(--error); }
    .review-card.no-score  { border-left: 4px solid var(--grey); }
    .review-card-header { display: flex; align-items: flex-start; gap: 14px; padding: 18px 20px; cursor: pointer; }
    .review-icon {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .review-icon.correct  { background: var(--success); color: white; }
    .review-icon.incorrect { background: var(--error); color: white; }
    .review-icon.no-score { background: var(--grey); color: white; }
    .review-body { flex: 1; }
    .review-meta { font-size: 11px; color: var(--grey); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
    .review-qtext { font-family: var(--font-serif); font-size: 14px; line-height: 1.5; color: var(--navy); margin-bottom: 10px; }
    .review-answer-row { display: flex; flex-wrap: wrap; gap: 18px; font-size: 13px; }
    .review-ans-label { color: var(--grey); margin-right: 4px; }
    .review-ans-val { font-weight: 600; color: var(--navy); }
    .review-ans-val.wrong   { color: var(--error); text-decoration: line-through; }
    .review-ans-val.correct { color: var(--success); }
    .review-timing { font-size: 12px; color: var(--grey); margin-top: 8px; }
    .review-expand-btn {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 12px;
      background: none;
      border: 1.5px solid var(--light-grey);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: var(--font-sans);
      font-size: 12px; font-weight: 600;
      color: var(--navy); cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .review-expand-btn:hover { border-color: var(--navy); background: var(--cream); }
    .review-explanation {
      display: none;
      padding: 16px 20px;
      background: var(--cream);
      border-top: 1px solid var(--light-grey);
      font-size: 14px; line-height: 1.7;
      color: var(--navy);
    }
    .review-explanation.open { display: block; }

    /* Results footer note */
    .results-note {
      background: var(--white);
      border: 1px solid var(--light-grey);
      border-left: 4px solid var(--gold);
      border-radius: 8px;
      padding: 18px 22px; margin-top: 8px;
      font-size: 14px; color: var(--grey); line-height: 1.6;
    }
    .results-note strong { color: var(--navy); }

    /* Submit error */
    .submit-error {
      background: #FDECEA; border: 1px solid #F5C6C2;
      border-radius: 8px; padding: 14px 18px;
      font-size: 14px; color: var(--error);
      margin-top: 16px; display: none;
    }

    /* ===== FOOTER ===== */
    .site-footer {
      background: var(--navy);
      padding: 20px 32px; text-align: center;
      font-size: 12px; color: rgba(255,255,255,0.3);
      letter-spacing: 0.04em;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .main-wrap { padding: 24px 16px 48px; }
      .name-screen-title { font-size: 22px; }
      .domain-bar-wrap { width: 80px; }
      .timer-display { font-size: 18px; }
      .site-header { padding: 14px 16px; }
    }
  </style>
</head>

<!-- ============================================================
     CONFIGURATION
     ============================================================ -->
<script>

  /* ----------------------------------------------------------
     SUPABASE CREDENTIALS
     ---------------------------------------------------------- */
  var SB_URL = 'https://takuuqvpyqvomcfmcjoz.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRha3V1cXZweXF2b21jZm1jam96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2ODM2MDYsImV4cCI6MjA5MDI1OTYwNn0.X_9VXsZBO5pKlNtvP5-AL6d5LlSfjNxDSb8NZB9vO7M';

  /* ----------------------------------------------------------
     QUESTIONS — loaded dynamically from Supabase
     URL parameters control which questions are fetched:
       dtype      Diagnostic type for results logging, e.g. rw_wic_easy_1
       label      Session label, e.g. "Words in Context — Easy"
       section    RW or MATH (optional filter)
       skill      Exact skill name (optional filter)
       difficulty Easy | Medium | Hard (optional filter)
       domain     Exact domain name (optional filter)
       limit      Max questions to serve (default: 8)
       name       Pre-fills the student name field
       minutes    Timer in minutes (default: 0 = untimed)
  ---------------------------------------------------------- */

  var QUESTIONS    = [];   /* populated after Supabase fetch */
  var STUDENT_ID   = null;

  /* Read URL params */
  function getParam(key) {
    var search = window.location.search;
    if (!search) return null;
    var pairs = search.substring(1).split('&');
    for (var i = 0; i < pairs.length; i++) {
      var kv = pairs[i].split('=');
      if (decodeURIComponent(kv[0]) === key) return kv[1] ? decodeURIComponent(kv[1].replace(/\+/g,' ')) : '';
    }
    return null;
  }

  var P_SECTION    = getParam('section');
  var P_SKILL      = getParam('skill');
  var P_DIFFICULTY = getParam('difficulty');
  var P_DOMAIN     = getParam('domain');
  var P_LIMIT      = parseInt(getParam('limit') || '8', 10);
  var P_NAME       = getParam('name') || '';
  var P_MINUTES    = parseInt(getParam('minutes') || '0', 10);
  var P_LABEL      = getParam('label') || (P_SKILL || 'SAT Practice');
  var P_DTYPE      = getParam('dtype') || 'sat_practice_1';

  var DIAGNOSTIC_TYPE  = P_DTYPE;
  var DIAGNOSTIC_LABEL = P_LABEL;

  var CONFIG = {
    sessionTitle:          P_LABEL,
    sessionSubtitle:       P_SECTION === 'MATH' ? 'Math' : P_SECTION === 'RW' ? 'Reading & Writing' : 'SAT Practice',
    totalMinutes:          P_MINUTES,
    timerVisibleByDefault: true,
    introHeading:          'Ready to Begin?',
    introDescription:      'Work through each question carefully. You can navigate back to change your answers before submitting.',
    infoPoints: [
      P_MINUTES > 0 ? 'You have ' + P_MINUTES + ' minutes. The timer starts when you click Begin.' : 'This session is untimed.',
      'Use the Back and Next buttons to move between questions.',
      'Your tutor will be notified when you submit.'
    ],
    nameLabel:   'Your Full Name',
    nameHint:    'Enter your name as it should appear on your results.',
    resultsTitle: 'Session Complete',
    tutorNote:    'Your tutor has been notified. They will review these results before your next session.'
  };

  /* ----------------------------------------------------------
     MAP Supabase row -> internal question format
  ---------------------------------------------------------- */
  function mapRow(row, index) {
    var qtype = (row.format && row.format.toUpperCase() === 'SPR') ? 'spr' : 'mcq';
    var obj = {
      id:          row.q_id || ('q' + index),
      domain:      row.skill || row.domain || 'SAT',
      type:        qtype,
      passage:     row.passage || '',
      text:        row.question_stem || '',
      explanation: row.explanation || '',
      required:    true
    };

    if (qtype === 'mcq') {
      obj.options = [
        row.choice_a || '',
        row.choice_b || '',
        row.choice_c || '',
        row.choice_d || ''
      ];
      /* Convert letter answer (A/B/C/D) to 0-based index */
      var letterMap = { 'A': 0, 'B': 1, 'C': 2, 'D': 3 };
      var ans = String(row.correct_answer || 'A').trim().toUpperCase();
      obj.answer = letterMap[ans] !== undefined ? letterMap[ans] : 0;
    } else {
      /* SPR */
      obj.answer = String(row.correct_answer || '').trim();
    }

    return obj;
  }

  /* ----------------------------------------------------------
     LOAD QUESTIONS from Supabase
  ---------------------------------------------------------- */
  function loadQuestions(onReady) {
    var url = SB_URL + '/rest/v1/questions?select=*';

    /* Apply filters — if no params, default to RW Easy as a demo */
    var hasFilter = P_SECTION || P_SKILL || P_DIFFICULTY || P_DOMAIN;
    if (!hasFilter) {
      url += '&section=eq.RW&difficulty=eq.Easy';
    } else {
      if (P_SECTION)    url += '&section=eq.'    + encodeURIComponent(P_SECTION);
      if (P_SKILL)      url += '&skill=eq.'      + encodeURIComponent(P_SKILL);
      if (P_DIFFICULTY) url += '&difficulty=eq.' + encodeURIComponent(P_DIFFICULTY);
      if (P_DOMAIN)     url += '&domain=eq.'     + encodeURIComponent(P_DOMAIN);
    }

    /* Fetch up to 3x the needed amount, shuffle in JS for randomisation */
    url += '&limit=' + (P_LIMIT * 3);

    fetch(url, {
      headers: {
        'apikey':        SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY
      }
    })
    .then(function(res) {
      if (!res.ok) throw new Error('Could not load questions (status ' + res.status + ')');
      return res.json();
    })
    .then(function(rows) {
      if (!rows || rows.length === 0) throw new Error('No questions found for this filter. Check the question bank.');
      /* Shuffle and take P_LIMIT */
      for (var i = rows.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = rows[i]; rows[i] = rows[j]; rows[j] = tmp;
      }
      QUESTIONS = rows.slice(0, P_LIMIT).map(mapRow);
      onReady(null);
    })
    .catch(function(err) {
      onReady(err);
    });
  }

</script>

<!-- ===== MAIN SCRIPT (ES5 ONLY) ===== -->
<script>

  /* ==========================================================
     SECTION 1 — STATE
     ========================================================== */
  var currentIndex       = 0;
  var questionStartTime  = 0;
  var sessionStartTime   = 0;
  var ANSWERS            = {};   /* questionId -> answer value */
  var TIMING             = {};   /* questionId -> ms spent     */
  var RANKING_STATE      = {};   /* questionId -> ordered array */
  var sessionTimeLeft    = 0;    /* seconds remaining          */
  var timerInterval      = null;
  var timerHidden        = false;
  var submitPending      = false; /* true after first submit attempt with gaps */
  var sessionSubmitted   = false;

  /* ==========================================================
     SECTION 2 — UTILITIES
     ========================================================== */
  function escHtml(str) {
    if (str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function formatTime(totalSeconds) {
    if (totalSeconds < 0) totalSeconds = 0;
    var m = Math.floor(totalSeconds / 60);
    var s = totalSeconds % 60;
    return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
  }

  function scoredTypes() {
    /* Question types that have right/wrong answers */
    return { 'mcq': true, 'spr': true };
  }

  function countScoreable() {
    var n = 0;
    for (var i = 0; i < QUESTIONS.length; i++) {
      if (scoredTypes()[QUESTIONS[i].type]) n++;
    }
    return n;
  }

  function countUnanswered() {
    var n = 0;
    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];
      if (!q.required && q.type !== 'mcq' && q.type !== 'spr') continue;
      if (typeof ANSWERS[q.id] === 'undefined' || ANSWERS[q.id] === '') n++;
    }
    return n;
  }

  /* Compare SPR answers numerically where possible */
  function sprCorrect(chosen, correct) {
    var c = String(chosen).trim();
    var r = String(correct).trim();
    if (c === r) return true;
    /* Try fraction parse */
    function parseFrac(s) {
      s = s.replace(/\s/g, '');
      if (s.indexOf('/') !== -1) {
        var parts = s.split('/');
        if (parts.length === 2) return parseFloat(parts[0]) / parseFloat(parts[1]);
      }
      return parseFloat(s);
    }
    var cn = parseFrac(c);
    var rn = parseFrac(r);
    if (!isNaN(cn) && !isNaN(rn)) return Math.abs(cn - rn) < 0.001;
    return false;
  }

  /* ==========================================================
     SECTION 3 — DISPLAY INIT
     ========================================================== */
  function initDisplay() {
    document.title = CONFIG.sessionTitle + ' | Harland Education';
    document.getElementById('headerSubEl').textContent    = CONFIG.sessionSubtitle;
    document.getElementById('introHeadingEl').textContent = CONFIG.introHeading;
    document.getElementById('introDescEl').textContent    = CONFIG.introDescription;
    document.getElementById('nameLabelEl').textContent    = CONFIG.nameLabel;
    document.getElementById('nameHintEl').textContent     = CONFIG.nameHint;
    document.getElementById('resultsTitleEl').textContent = CONFIG.resultsTitle;

    var cardEl = document.getElementById('infoCardEl');
    var html = '';
    for (var i = 0; i < CONFIG.infoPoints.length; i++) {
      html += '<p><strong>' + (i + 1) + '.</strong> ' + escHtml(CONFIG.infoPoints[i]) + '</p>';
    }
    cardEl.innerHTML = html;

    /* Pre-init ranking state */
    for (var j = 0; j < QUESTIONS.length; j++) {
      var q = QUESTIONS[j];
      if (q.type === 'ranking') RANKING_STATE[q.id] = q.items.slice();
    }
  }

  /* ==========================================================
     SECTION 4 — SESSION START
     ========================================================== */
  document.getElementById('btnBegin').onclick = function() {
    var name = document.getElementById('studentName').value.trim();
    if (!name) {
      document.getElementById('nameError').style.display = 'block';
      document.getElementById('studentName').focus();
      return;
    }
    document.getElementById('nameError').style.display = 'none';
    sessionStartTime = Date.now();
    showScreen('screenQuestion');
    document.getElementById('progressWrap').style.display = 'block';
    startTimer();
    showQuestion(0);
  };

  /* ==========================================================
     SECTION 5 — TIMER
     ========================================================== */
  function startTimer() {
    var timerSec = document.getElementById('timerSection');
    if (!CONFIG.totalMinutes || CONFIG.totalMinutes <= 0) {
      timerSec.style.display = 'none';
      return;
    }
    sessionTimeLeft = CONFIG.totalMinutes * 60;
    timerHidden = !CONFIG.timerVisibleByDefault;
    timerSec.style.display = 'flex';
    updateTimerDisplay();
    timerInterval = setInterval(function() {
      sessionTimeLeft--;
      updateTimerDisplay();
      if (sessionTimeLeft <= 0) {
        clearInterval(timerInterval);
        doAutoSubmit();
      }
    }, 1000);
  }

  function updateTimerDisplay() {
    var el = document.getElementById('timerDisplay');
    if (!el) return;
    el.className = 'timer-display';
    if (timerHidden) {
      el.className += ' hidden-time';
      el.textContent = '--:--';
      return;
    }
    el.textContent = formatTime(sessionTimeLeft);
    if (sessionTimeLeft <= 60)       el.className += ' danger';
    else if (sessionTimeLeft <= 300) el.className += ' warn';
  }

  function toggleTimerVisibility() {
    timerHidden = !timerHidden;
    var btn = document.getElementById('timerToggleBtn');
    btn.textContent = timerHidden ? 'Show' : 'Hide';
    updateTimerDisplay();
  }

  function doAutoSubmit() {
    if (sessionSubmitted) return;
    recordCurrentQuestionTime();
    submitSession(true);
  }

  /* ==========================================================
     SECTION 6 — QUESTION NAVIGATION
     ========================================================== */
  function recordCurrentQuestionTime() {
    if (currentIndex < 0 || currentIndex >= QUESTIONS.length) return;
    var q = QUESTIONS[currentIndex];
    var elapsed = Date.now() - questionStartTime;
    TIMING[q.id] = (TIMING[q.id] || 0) + elapsed;
  }

  function showQuestion(index) {
    currentIndex = index;
    questionStartTime = Date.now();
    var q = QUESTIONS[index];

    /* Domain badge */
    document.getElementById('qDomainBadge').textContent = escHtml(q.domain);

    /* Render the card */
    renderSingleQuestion(q, index);

    /* Back button */
    var btnBack = document.getElementById('btnBack');
    btnBack.style.display = (index === 0) ? 'none' : 'inline-flex';

    /* Next / Submit button */
    var btnNext = document.getElementById('btnNext');
    var isLast  = (index === QUESTIONS.length - 1);
    if (isLast) {
      btnNext.textContent = 'Submit Session';
      btnNext.className   = 'btn-primary btn-submit';
    } else {
      btnNext.innerHTML = 'Next &#8594;';
      btnNext.className = 'btn-primary';
    }

    /* Progress bar */
    var pct = Math.round(((index + 1) / QUESTIONS.length) * 100);
    document.getElementById('progressFill').style.width  = pct + '%';
    document.getElementById('progressLabel').textContent =
      'Question ' + (index + 1) + ' of ' + QUESTIONS.length + ' — ' + escHtml(q.domain);

    /* Reset warnings */
    document.getElementById('unansweredWarning').style.display = 'none';
    document.getElementById('submitError').style.display = 'none';
    submitPending = false;

    window.scrollTo(0, 0);
  }

  function goNext() {
    recordCurrentQuestionTime();
    var isLast = (currentIndex === QUESTIONS.length - 1);

    if (isLast) {
      /* Submit flow */
      var unanswered = countUnanswered();
      if (unanswered > 0 && !submitPending) {
        submitPending = true;
        var w = document.getElementById('unansweredWarning');
        w.style.display = 'block';
        w.innerHTML = 'You have <strong>' + unanswered + '</strong> unanswered question'
          + (unanswered !== 1 ? 's' : '')
          + '. Click <strong>Submit Session</strong> again to confirm and finish.';
        return;
      }
      submitSession(false);
    } else {
      showQuestion(currentIndex + 1);
    }
  }

  function goBack() {
    if (currentIndex === 0) return;
    recordCurrentQuestionTime();
    showQuestion(currentIndex - 1);
  }

  /* ==========================================================
     SECTION 7 — QUESTION RENDERING
     ========================================================== */
  function renderSingleQuestion(q, index) {
    var html = '<div class="question-card">';
    html += '<div class="question-number-line">Question ' + (index + 1) + ' of ' + QUESTIONS.length + '</div>';

    /* Optional passage */
    if (q.passage) {
      html += '<div class="question-passage">' + escHtml(q.passage) + '</div>';
    }

    html += '<div class="question-text">' + escHtml(q.text) + '</div>';

    if (q.type === 'mcq')     html += renderMcq(q);
    else if (q.type === 'spr')    html += renderSpr(q);
    else if (q.type === 'text')   html += renderText(q);
    else if (q.type === 'scale')  html += renderScale(q);
    else if (q.type === 'ranking') html += renderRanking(q);

    html += '</div>';
    document.getElementById('qCardContainer').innerHTML = html;

    /* Restore existing answer */
    restoreAnswer(q);

    /* Attach input listeners */
    attachQuestionListeners(q);
  }

  function restoreAnswer(q) {
    if (q.type === 'mcq' && typeof ANSWERS[q.id] !== 'undefined') {
      var radio = document.querySelector('input[name="mcq_' + q.id + '"][value="' + ANSWERS[q.id] + '"]');
      if (radio) radio.checked = true;
    } else if (q.type === 'spr' && ANSWERS[q.id]) {
      var sprEl = document.getElementById('spr_' + q.id);
      if (sprEl) sprEl.value = ANSWERS[q.id];
    } else if (q.type === 'text' && ANSWERS[q.id]) {
      var taEl = document.getElementById('txt_' + q.id);
      if (taEl) {
        taEl.value = ANSWERS[q.id];
        var cc = document.getElementById('cc_' + q.id);
        if (cc) cc.textContent = ANSWERS[q.id].length + ' characters';
      }
    } else if (q.type === 'scale' && typeof ANSWERS[q.id] !== 'undefined') {
      var sb = document.querySelector('.scale-btn[data-qid="' + q.id + '"][data-val="' + ANSWERS[q.id] + '"]');
      if (sb) sb.classList.add('selected');
    }
    /* Ranking: always re-renders from RANKING_STATE, nothing to restore */
  }

  function attachQuestionListeners(q) {
    if (q.type === 'mcq') {
      var radios = document.querySelectorAll('input[name="mcq_' + q.id + '"]');
      for (var i = 0; i < radios.length; i++) {
        radios[i].onchange = (function(qid) {
          return function() { ANSWERS[qid] = parseInt(this.value, 10); };
        })(q.id);
      }
    } else if (q.type === 'spr') {
      var sprEl = document.getElementById('spr_' + q.id);
      if (sprEl) {
        sprEl.oninput = (function(qid) {
          return function() { ANSWERS[qid] = this.value.trim(); };
        })(q.id);
      }
    } else if (q.type === 'text') {
      var taEl = document.getElementById('txt_' + q.id);
      if (taEl) {
        taEl.oninput = (function(qid) {
          return function() {
            ANSWERS[qid] = this.value;
            var cc = document.getElementById('cc_' + qid);
            if (cc) cc.textContent = this.value.length + ' characters';
          };
        })(q.id);
      }
    } else if (q.type === 'scale') {
      var btns = document.querySelectorAll('.scale-btn[data-qid="' + q.id + '"]');
      for (var k = 0; k < btns.length; k++) {
        btns[k].onclick = (function(qid) {
          return function() {
            ANSWERS[qid] = parseInt(this.getAttribute('data-val'), 10);
            var siblings = document.querySelectorAll('.scale-btn[data-qid="' + qid + '"]');
            for (var s = 0; s < siblings.length; s++) siblings[s].classList.remove('selected');
            this.classList.add('selected');
          };
        })(q.id);
      }
    }
  }

  /* --- Renderers --- */
  function renderMcq(q) {
    var letters = ['A', 'B', 'C', 'D', 'E', 'F'];
    var html = '<ul class="mcq-options">';
    for (var i = 0; i < q.options.length; i++) {
      var iid = 'mcq_' + q.id + '_' + i;
      html += '<li>'
            + '<input type="radio" name="mcq_' + escHtml(q.id) + '" id="' + iid + '" value="' + i + '">'
            + '<label for="' + iid + '">'
            + '<span class="option-letter">' + letters[i] + '</span>'
            + escHtml(q.options[i])
            + '</label></li>';
    }
    return html + '</ul>';
  }

  function renderSpr(q) {
    return '<div class="spr-wrap">'
         + '<input type="text" class="spr-input" id="spr_' + escHtml(q.id) + '" '
         + 'placeholder="Your answer" autocomplete="off" spellcheck="false">'
         + '<div class="spr-hint">Enter a number, fraction (e.g. 3/4), or decimal (e.g. 0.75)</div>'
         + '</div>';
  }

  function renderText(q) {
    var hint = q.hint ? escHtml(q.hint) : '';
    return '<textarea class="text-response" id="txt_' + escHtml(q.id) + '" '
         + 'placeholder="' + hint + '" rows="5"></textarea>'
         + '<div class="text-char-count" id="cc_' + escHtml(q.id) + '">0 characters</div>';
  }

  function renderScale(q) {
    var html = '<div class="scale-wrap">'
             + '<div class="scale-labels"><span>' + escHtml(q.labelLow) + '</span><span>' + escHtml(q.labelHigh) + '</span></div>'
             + '<div class="scale-buttons">';
    for (var v = q.min; v <= q.max; v++) {
      html += '<button type="button" class="scale-btn" data-qid="' + escHtml(q.id) + '" data-val="' + v + '">' + v + '</button>';
    }
    return html + '</div></div>';
  }

  function renderRanking(q) {
    var items = RANKING_STATE[q.id];
    var html = '<p style="font-size:12px;color:var(--grey);margin-bottom:12px;">Use the arrows to reorder. Top = most preferred.</p>'
             + '<ul class="rank-list" id="ranklist_' + escHtml(q.id) + '">';
    for (var i = 0; i < items.length; i++) {
      html += buildRankItem(q.id, i, items.length, items[i]);
    }
    return html + '</ul>';
  }

  function buildRankItem(qid, idx, total, text) {
    var upDis   = (idx === 0)          ? 'disabled' : '';
    var downDis = (idx === total - 1)  ? 'disabled' : '';
    return '<li class="rank-item">'
         + '<div class="rank-position">' + (idx + 1) + '</div>'
         + '<div class="rank-text">' + escHtml(text) + '</div>'
         + '<div class="rank-controls">'
         + '<button type="button" class="rank-btn" ' + upDis   + ' onclick="moveRankItem(\'' + escHtml(qid) + '\',' + idx + ',-1)" title="Move up">&#9650;</button>'
         + '<button type="button" class="rank-btn" ' + downDis + ' onclick="moveRankItem(\'' + escHtml(qid) + '\',' + idx + ',1)"  title="Move down">&#9660;</button>'
         + '</div></li>';
  }

  function moveRankItem(qid, idx, dir) {
    var items  = RANKING_STATE[qid];
    var newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= items.length) return;
    var tmp = items[idx]; items[idx] = items[newIdx]; items[newIdx] = tmp;
    RANKING_STATE[qid] = items;
    /* Re-render the list only */
    var listEl = document.getElementById('ranklist_' + qid);
    var html = '';
    for (var i = 0; i < items.length; i++) html += buildRankItem(qid, i, items.length, items[i]);
    listEl.innerHTML = html;
    /* Save to ANSWERS */
    ANSWERS[qid] = items.slice();
  }

  /* ==========================================================
     SECTION 8 — PAYLOAD ASSEMBLY
     ========================================================== */
  function collectPayload() {
    var studentName  = document.getElementById('studentName').value.trim();
    var mcqScores    = {};
    var selfRatings  = {};
    var preferences  = {};
    var rawResponses = {};
    var timingData   = {};
    var scored       = 0;
    var correct      = 0;

    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];

      /* Timing: convert ms to seconds, round */
      timingData[q.id] = Math.round((TIMING[q.id] || 0) / 1000);

      if (q.type === 'mcq') {
        var chosen  = ANSWERS[q.id];
        var isCorrect = (typeof chosen !== 'undefined') ? (chosen === q.answer) : null;
        if (isCorrect) correct++;
        scored++;
        mcqScores[q.id]    = { chosen: chosen, answer: q.answer, correct: isCorrect };
        rawResponses[q.id] = chosen;

      } else if (q.type === 'spr') {
        var chosenSpr = ANSWERS[q.id] || '';
        var sprOk     = chosenSpr !== '' ? sprCorrect(chosenSpr, q.answer) : null;
        if (sprOk) correct++;
        scored++;
        mcqScores[q.id]    = { chosen: chosenSpr, answer: q.answer, correct: sprOk };
        rawResponses[q.id] = chosenSpr;

      } else if (q.type === 'text') {
        rawResponses[q.id] = ANSWERS[q.id] || '';

      } else if (q.type === 'scale') {
        selfRatings[q.id]  = ANSWERS[q.id];
        rawResponses[q.id] = ANSWERS[q.id];

      } else if (q.type === 'ranking') {
        preferences[q.id]  = RANKING_STATE[q.id] || [];
        rawResponses[q.id] = RANKING_STATE[q.id] || [];
      }
    }

    var sessionSecs = Math.round((Date.now() - sessionStartTime) / 1000);

    return {
      student_id:        STUDENT_ID,
      student_name:      studentName,
      diagnostic_type:   DIAGNOSTIC_TYPE,
      diagnostic_label:  DIAGNOSTIC_LABEL,
      raw_responses:     rawResponses,
      mcq_scores:        mcqScores,
      self_ratings:      selfRatings,
      preferences:       preferences,
      timing_data:       timingData,
      session_duration:  sessionSecs,
      /* Convenience fields for quick dashboard queries */
      score_correct:     correct,
      score_total:       scored
    };
  }

  /* ==========================================================
     SECTION 9 — SUPABASE SUBMISSION
     ========================================================== */
  function submitToSupabase(payload, onSuccess, onError) {
    var headers = {
      'Content-Type':  'application/json',
      'apikey':        SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Prefer':        'return=representation'
    };

    fetch(SB_URL + '/rest/v1/diagnostics', {
      method: 'POST', headers: headers,
      body: JSON.stringify(payload)
    })
    .then(function(res) {
      if (!res.ok) throw new Error('Diagnostic insert failed: ' + res.status);
      return res.json();
    })
    .then(function(data) {
      var diagnosticId = data[0].id;
      var reportPayload = {
        diagnostic_id:    diagnosticId,
        student_id:       payload.student_id,
        student_name:     payload.student_name,
        diagnostic_label: payload.diagnostic_label,
        ai_report:        null,
        edited_report:    null,
        status:           'pending',
        reviewed_by:      null,
        reviewed_at:      null,
        sent_at:          null,
        send_notes:       null
      };
      return fetch(SB_URL + '/rest/v1/reports', {
        method: 'POST', headers: headers,
        body: JSON.stringify(reportPayload)
      });
    })
    .then(function(res) {
      if (!res.ok) throw new Error('Report insert failed: ' + res.status);
      onSuccess();
    })
    .catch(function(err) { onError(err); });
  }

  /* ==========================================================
     SECTION 10 — SESSION SUBMIT ORCHESTRATION
     ========================================================== */
  function submitSession(autoTriggered) {
    if (sessionSubmitted) return;
    sessionSubmitted = true;
    if (timerInterval) clearInterval(timerInterval);

    var payload = collectPayload();

    /* Show results immediately — don't make student wait for Supabase */
    showResults(payload);

    /* Then silently send to Supabase */
    submitToSupabase(
      payload,
      function() { /* success — results already visible, nothing more to do */ },
      function(err) {
        /* Non-blocking error note below results */
        var noteEl = document.getElementById('resultsNoteEl');
        if (noteEl) {
          noteEl.style.borderLeftColor = 'var(--error)';
          noteEl.innerHTML += '<br><span style="color:var(--error);font-size:13px;">Note: There was an issue syncing your results to the server. Please screenshot this page and inform your tutor. Error: ' + escHtml(err.message) + '</span>';
        }
        console.error('Supabase error:', err);
        sessionSubmitted = false; /* allow retry if needed */
      }
    );
  }

  /* ==========================================================
     SECTION 11 — RESULTS RENDERING
     ========================================================== */
  function showResults(payload) {
    showScreen('screenResults');
    document.getElementById('progressWrap').style.display   = 'none';
    document.getElementById('timerSection').style.display   = 'none';

    var studentName = payload.student_name;
    document.getElementById('resultsStudentName').textContent = studentName;

    /* Score ring */
    var total   = payload.score_total;
    var correct = payload.score_correct;
    var pct     = total > 0 ? Math.round((correct / total) * 100) : 0;

    document.getElementById('scoreFraction').textContent = correct + '/' + total;
    var pctPill = document.getElementById('scorePctPill');
    pctPill.textContent = pct + '%';

    var ringFill = document.getElementById('scoreRingFill');
    ringFill.className = 'score-ring-fill';
    if (pct >= 80)      ringFill.className += ' high';
    else if (pct < 50)  ringFill.className += ' low';
    if (pct >= 80) pctPill.className = 'score-pct-pill high';
    else if (pct < 50) pctPill.className = 'score-pct-pill low';
    else pctPill.className = 'score-pct-pill';

    setTimeout(function() {
      var circumference = 408.41;
      ringFill.style.strokeDashoffset = circumference * (1 - pct / 100);
    }, 120);

    /* Summary bar */
    var incorrect = total - correct;
    var skipped   = 0;
    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];
      if ((q.type === 'mcq' || q.type === 'spr') &&
          (typeof ANSWERS[q.id] === 'undefined' || ANSWERS[q.id] === '')) skipped++;
    }
    var avgSec = 0;
    var tKeys = Object.keys(payload.timing_data);
    if (tKeys.length > 0) {
      var tTotal = 0;
      for (var k = 0; k < tKeys.length; k++) tTotal += payload.timing_data[tKeys[k]];
      avgSec = Math.round(tTotal / tKeys.length);
    }
    document.getElementById('summaryBar').innerHTML =
      statCard(correct,   'Correct',  'green') +
      statCard(incorrect, 'Incorrect', 'red')  +
      statCard(skipped,   'Skipped',   'amber') +
      statCard(avgSec + 's', 'Avg / Question', '');

    /* Domain breakdown */
    buildDomainBreakdown(payload);

    /* Question review */
    buildQuestionReview(payload);

    /* Tutor note */
    document.getElementById('resultsNoteEl').innerHTML =
      '<strong>What happens next:</strong> ' + escHtml(CONFIG.tutorNote);

    window.scrollTo(0, 0);
  }

  function statCard(val, lbl, cls) {
    return '<div class="summary-stat">'
         + '<div class="summary-val ' + cls + '">' + val + '</div>'
         + '<div class="summary-lbl">' + lbl + '</div>'
         + '</div>';
  }

  function buildDomainBreakdown(payload) {
    /* Collect per-domain correct/total */
    var domainMap = {};   /* domain -> { correct, total } */
    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];
      if (q.type !== 'mcq' && q.type !== 'spr') continue;
      if (!domainMap[q.domain]) domainMap[q.domain] = { correct: 0, total: 0 };
      domainMap[q.domain].total++;
      var sc = payload.mcq_scores[q.id];
      if (sc && sc.correct) domainMap[q.domain].correct++;
    }

    var domains = Object.keys(domainMap);
    if (domains.length === 0) {
      document.getElementById('domainBreakdownContainer').innerHTML =
        '<p style="color:var(--grey);font-size:14px;">No scored questions in this session.</p>';
      return;
    }

    var html = '';
    for (var d = 0; d < domains.length; d++) {
      var dom   = domains[d];
      var data  = domainMap[dom];
      var dpct  = Math.round((data.correct / data.total) * 100);
      var barCls = '';
      if (dpct === 100) barCls = 'perfect';
      else if (dpct < 50) barCls = 'poor';
      html += '<div class="domain-row">'
            + '<div class="domain-row-name">' + escHtml(dom) + '</div>'
            + '<div class="domain-bar-wrap"><div class="domain-bar-fill ' + barCls + '" style="width:' + dpct + '%"></div></div>'
            + '<div class="domain-row-score">' + data.correct + '/' + data.total + '</div>'
            + '</div>';
    }
    document.getElementById('domainBreakdownContainer').innerHTML = html;
  }

  function buildQuestionReview(payload) {
    var letters = ['A', 'B', 'C', 'D', 'E', 'F'];
    var html    = '';

    for (var i = 0; i < QUESTIONS.length; i++) {
      var q   = QUESTIONS[i];
      var sc  = payload.mcq_scores[q.id];
      var isScored = (q.type === 'mcq' || q.type === 'spr');
      var timeSec = payload.timing_data[q.id] || 0;

      /* Determine result class */
      var resultCls = 'no-score';
      var iconCls   = 'no-score';
      var iconSymbol = '&#8212;';
      if (isScored) {
        if (!sc || typeof ANSWERS[q.id] === 'undefined' || ANSWERS[q.id] === '') {
          resultCls  = 'incorrect';
          iconCls    = 'incorrect';
          iconSymbol = '&#10005;'; /* X — skipped */
        } else if (sc.correct) {
          resultCls  = 'correct';
          iconCls    = 'correct';
          iconSymbol = '&#10003;'; /* checkmark */
        } else {
          resultCls  = 'incorrect';
          iconCls    = 'incorrect';
          iconSymbol = '&#10005;';
        }
      }

      html += '<div class="review-card ' + resultCls + '">';

      /* Header (always visible) */
      html += '<div class="review-card-header">';
      html += '<div class="review-icon ' + iconCls + '">' + iconSymbol + '</div>';
      html += '<div class="review-body">';
      html += '<div class="review-meta">Q' + (i + 1) + ' &nbsp;&bull;&nbsp; ' + escHtml(q.domain) + '</div>';

      /* Truncate long question text */
      var qShort = q.text.length > 120 ? q.text.substring(0, 120) + '...' : q.text;
      html += '<div class="review-qtext">' + escHtml(qShort) + '</div>';

      /* Answer row for MCQ */
      if (q.type === 'mcq' && sc) {
        var chosenLetter  = (typeof sc.chosen !== 'undefined') ? letters[sc.chosen] : '—';
        var correctLetter = (typeof sc.answer !== 'undefined') ? letters[sc.answer] : '—';
        var chosenCls     = sc.correct ? 'correct' : 'wrong';
        html += '<div class="review-answer-row">'
              + '<span><span class="review-ans-label">Your answer:</span> <span class="review-ans-val ' + chosenCls + '">' + chosenLetter + '</span></span>'
              + '<span><span class="review-ans-label">Correct:</span> <span class="review-ans-val correct">' + correctLetter + '</span></span>'
              + '</div>';
      }

      /* Answer row for SPR */
      if (q.type === 'spr' && sc) {
        var chosenSprDisp  = sc.chosen !== '' ? escHtml(String(sc.chosen)) : '(not answered)';
        var sprCls = sc.correct ? 'correct' : 'wrong';
        html += '<div class="review-answer-row">'
              + '<span><span class="review-ans-label">Your answer:</span> <span class="review-ans-val ' + sprCls + '">' + chosenSprDisp + '</span></span>'
              + '<span><span class="review-ans-label">Correct:</span> <span class="review-ans-val correct">' + escHtml(String(q.answer)) + '</span></span>'
              + '</div>';
      }

      /* Timing */
      html += '<div class="review-timing">Time spent: ' + timeSec + ' second' + (timeSec !== 1 ? 's' : '') + '</div>';

      /* Explanation toggle — only for scored questions with explanation text */
      if (isScored && q.explanation) {
        html += '<button class="review-expand-btn" onclick="toggleExplanation(\'exp_' + escHtml(q.id) + '\')" id="expbtn_' + escHtml(q.id) + '">'
              + '&#9660; See Explanation'
              + '</button>';
      }

      html += '</div>'; /* close review-body */
      html += '</div>'; /* close review-card-header */

      /* Explanation body */
      if (isScored && q.explanation) {
        html += '<div class="review-explanation" id="exp_' + escHtml(q.id) + '">'
              + escHtml(q.explanation)
              + '</div>';
      }

      html += '</div>'; /* close review-card */
    }

    document.getElementById('questionReviewContainer').innerHTML = html;
  }

  function toggleExplanation(expId) {
    var el  = document.getElementById(expId);
    var qid = expId.replace('exp_', '');
    var btn = document.getElementById('expbtn_' + qid);
    if (!el) return;
    if (el.classList.contains('open')) {
      el.classList.remove('open');
      if (btn) btn.innerHTML = '&#9660; See Explanation';
    } else {
      el.classList.add('open');
      if (btn) btn.innerHTML = '&#9650; Hide Explanation';
    }
  }

  /* ==========================================================
     SECTION 12 — SCREEN SWITCHER
     ========================================================== */

  /* ==========================================================
     SECTION 13 — DYNAMIC LOAD INIT
     ========================================================== */
  (function dynamicInit() {
    /* Pre-fill name if passed via URL */
    if (P_NAME) {
      var nameEl = document.getElementById('studentName');
      if (nameEl) nameEl.value = P_NAME;
    }

    var msgEl = document.getElementById('loadingMsg');

    loadQuestions(function(err) {
      if (err) {
        if (msgEl) msgEl.innerHTML =
          '<span style="color:var(--error);">&#10005; ' + err.message + '</span><br>' +
          '<span style="font-size:13px;color:var(--grey);margin-top:8px;display:block;">Ask your tutor to check the setup.</span>';
        return;
      }
      /* Questions loaded — init display and show name screen */
      showScreen('screenName');
    });
  })();

  function showScreen(id) {
    var screens = document.querySelectorAll('.screen');
    for (var i = 0; i < screens.length; i++) screens[i].classList.remove('active');
    document.getElementById(id).classList.add('active');
  }

  /* ==========================================================
     SECTION 13 — INIT
     ========================================================== */
</script>
</body>
